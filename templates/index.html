<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narach Netra</title>
    <link rel="icon" type="image/x-icon" href="/static/narach-netra.ico">

    <!-- Bootstrap 5 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Folium/Leaflet map fills its container instead of using a fixed width */
        .card-body iframe,
        .card-body > div .leaflet-container {
            width: 100% !important;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 480px;">
        <div class="card-body p-4">

            <div class="d-flex align-items-center mb-3">
                <img src="/static/narach-netra.png" alt="Narach Netra logo" width="40" height="40" class="me-2">
                <h1 class="h4 mb-0">Narach Netra</h1>
            </div>

            {% if user %}
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-truncate">{{ user["email"] }}</span>
                    <a href="/logout" class="btn btn-sm btn-outline-secondary">Logout</a>
                </div>

                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" id="trackingToggle" onchange="toggleTracking()">
                    <label class="form-check-label" for="trackingToggle">Live tracking</label>
                </div>
                <p id="status" class="text-muted small mb-1">Tracking off</p>
                <p id="loc-info" class="font-monospace small text-secondary mb-3"></p>

                <form action="/add-email" method="get" class="input-group mb-3">
                    <input type="email" name="map-email" class="form-control" placeholder="Enter email to view map" required>
                    <button type="submit" class="btn btn-primary">Show map</button>
                </form>

                {% if map_html %}
                    <p class="text-muted text-center small mb-0">{{ emails }}</p>
                    <div class="border rounded overflow-hidden">
                        {{ map_html | safe }}
                    </div>
                {% else %}
                    <p class="text-muted text-center small mb-0">No locations to show.</p>
                {% endif %}

            {% else %}
                <a href="/login" class="btn btn-primary">Login</a>
            {% endif %}

        </div>
    </div>
</div>

<script>    
    const ACCURACY_THRESHOLD = 100; //Accuracy in meters
    let watchId = null;

    function toggleTracking() {
        const checkbox = document.getElementById("trackingToggle");
        const statusEl = document.getElementById("status");
        const locEl = document.getElementById("loc-info");

        if (checkbox.checked) {
            watchId = navigator.geolocation.watchPosition(success, error, {
                enableHighAccuracy: true
            });
            statusEl.textContent = "Tracking on";
            statusEl.classList.replace("text-muted", "text-success");
        } else {
            navigator.geolocation.clearWatch(watchId);
            statusEl.textContent = "Tracking off";
            statusEl.classList.replace("text-success", "text-muted");
            locEl.textContent = "";
        }
    }

    function success(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        if (accuracy <= ACCURACY_THRESHOLD) {
            sendLocation(lat, lon);
            document.getElementById("loc-info").textContent = `${lat}, ${lon}, Accuracy: ${Math.round(accuracy)}m`;
        } else {
            document.getElementById("loc-info").textContent = `Waiting for ${ACCURACY_THRESHOLD}m accuracy data...Current accuracy: ${Math.round(accuracy)}m`;
        } 
    }

    function error() {
        document.getElementById("loc-info").textContent = "Could not get your location";
    }

    function sendLocation(lat, lon) {
        fetch("/update_location", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: "{{ user['email'] }}",
                latitude: lat,
                longitude: lon
            })
        });
    }
</script>

{% for message in get_flashed_messages() %}
  <script>alert("{{ message }}");</script>
{% endfor %}

</body>
</html>
